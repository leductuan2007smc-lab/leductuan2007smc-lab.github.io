<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Liên Hệ</title>
    <link rel="stylesheet" href="css/lienhe.css">
   
</head>
<body>
    <div class="contact-container">
        <h1 class="contact-title">Liên Hệ Với Chúng Tôi</h1>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="hovaten">Họ và tên</label>
                <input type="text" id="hovaten" name="hovaten" placeholder="Nhập họ và tên của bạn" >
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email" >
            </div>
            
            <div class="form-group">
                <button type="submit" class="submit-btn">Gửi Thông Tin</button>
            </div>
        </form>
    </div>
</body>
</html>
