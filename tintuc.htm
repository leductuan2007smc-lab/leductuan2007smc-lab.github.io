<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Tin Tức</title>
    <link rel="stylesheet" href="tintuc.css">
</head>
<body>
    <header>
        <h1>Tin Tức Mới Nhất</h1>
        <p>Cập nhật những thông tin nóng hổi và hấp dẫn</p>
    </header>
    
    <main class="news-container">
        <div class="news-grid">
            <!-- Thẻ tin tức 1 -->
            <article class="news-card">
                <img src="sinhvien.jpg" alt="Khám phá khoa học" class="card-image">
                <div class="card-content">
                    <h2 class="card-title">thông tin tuyển sinh</h2>
                    <p class="card-date">Ngày 15 tháng 3, 2023</p>
                    <p class="card-excerpt">các trai xinh gái đẹp của trường đại học Đại Nam</p>
                    <a href="#" class="read-more">Đọc thêm</a>
                </div>
            </article>
            
            <!-- Thẻ tin tức 2 -->
            <article class="news-card">
                <img src="giangvien.jpg" alt="giảng viên" class="card-image">
                <div class="card-content">
                    <h2 class="card-title">Giảng viên đại học Đại Nam có gì hot</h2>
                    <p class="card-date">Ngày 14 tháng 3, 2023</p>
                    <p class="card-excerpt">cận cảnh hình ảnh các giảng viên của trường</p>
                    <a href="#" class="read-more">Đọc thêm</a>
                </div>
            </article>
